<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <style>
    .wire { stroke: currentColor; stroke-width: 2; fill: none; }
    .comp { stroke: currentColor; stroke-width: 2; fill: none; }
    .label { font-family: 'Georgia', serif; font-size: 14px; fill: currentColor; text-anchor: middle; }
    .label-sub { font-family: 'Georgia', serif; font-size: 11px; fill: currentColor; text-anchor: middle; opacity: 0.65; }
    .node-dot { fill: currentColor; }
  </style>

  <!-- Source terminal left -->
  <circle cx="30" cy="50" r="3" class="node-dot"/>
  <circle cx="30" cy="140" r="3" class="node-dot"/>

  <!-- V_in label -->
  <text x="18" y="78" class="label" text-anchor="end">V</text>
  <text x="18" y="118" class="label" text-anchor="end" font-size="11" opacity="0.65">in</text>
  <line x1="22" y1="70" x2="22" y2="82" class="wire" stroke-width="1.2"/>
  <line x1="18" y1="82" x2="26" y2="82" class="wire" stroke-width="1.2"/>

  <!-- Top wire to R -->
  <line x1="30" y1="50" x2="80" y2="50" class="wire"/>

  <!-- Resistor (zigzag) -->
  <polyline points="80,50 88,38 96,62 104,38 112,62 120,38 128,62 136,50" class="comp"/>
  <text x="108" y="30" class="label">R</text>

  <!-- Wire R to L -->
  <line x1="136" y1="50" x2="190" y2="50" class="wire"/>

  <!-- Inductor (humps) -->
  <path d="M190,50 C190,36 202,36 202,50 C202,36 214,36 214,50 C214,36 226,36 226,50 C226,36 238,36 238,50" class="comp"/>
  <text x="214" y="30" class="label">L</text>

  <!-- Wire L to C -->
  <line x1="238" y1="50" x2="300" y2="50" class="wire"/>

  <!-- Capacitor (parallel plates) -->
  <line x1="300" y1="35" x2="300" y2="65" class="comp" stroke-width="2.5"/>
  <line x1="312" y1="35" x2="312" y2="65" class="comp" stroke-width="2.5"/>
  <text x="306" y="26" class="label">C</text>

  <!-- Wire C to output -->
  <line x1="312" y1="50" x2="370" y2="50" class="wire"/>

  <!-- Output terminal -->
  <circle cx="370" cy="50" r="3" class="node-dot"/>
  <circle cx="370" cy="140" r="3" class="node-dot"/>

  <!-- Bottom return wire -->
  <line x1="30" y1="140" x2="370" y2="140" class="wire"/>

  <!-- Ground symbol -->
  <line x1="200" y1="140" x2="200" y2="148" class="wire"/>
  <line x1="188" y1="148" x2="212" y2="148" class="wire" stroke-width="2"/>
  <line x1="192" y1="153" x2="208" y2="153" class="wire" stroke-width="2"/>
  <line x1="196" y1="158" x2="204" y2="158" class="wire" stroke-width="2"/>

  <!-- Annotation: impedance at resonance -->
  <text x="440" y="52" class="label-sub">At f&#x2080;:</text>
  <text x="440" y="70" class="label-sub">Z = R</text>
  <text x="440" y="88" class="label-sub">(minimum)</text>
</svg>
